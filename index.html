<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傑斯克的練歌世界 Johsok's  KaLa  OK</title>
    <style>
        /* =========================================
           極致精美版：全域基礎重置與排版 
           ========================================= */
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; }
        button, .song-card, #playlist-ul li, .add-to-playlist-btn { transition: all 0.3s ease; }

        /* 自訂滾動條 (Webkit) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        body { 
            margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #e0e0e0; 
            overflow: hidden;
        }
        
        /* ✅ 修正 1：標題與工具列置中設計 */
        header { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            padding: 20px 30px; margin-bottom: 20px; 
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); text-align: center;
        }
        .title-area h1 { margin: 0; font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .title-area h2 { margin: 5px 0 0 0; font-size: 16px; color: #4facfe; font-weight: bold; letter-spacing: 1px; }
        
        .toolbar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .toolbar button { 
            padding: 10px 20px; cursor: pointer; font-size: 15px; font-weight: bold;
            background: rgba(255, 255, 255, 0.05); color: #ccc; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; 
        }
        .toolbar button:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: translateY(-2px); }
        .toolbar button.active { 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); 
            color: #fff; border: none; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); 
        }

        main { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        
        /* ✅ 修正 2：調整版面比例，讓右側欄再小一點 (原本 6.5 vs 3.5，現改為 7.5 vs 2.5) */
        #left-panel { 
            flex: 7.5; position: relative; overflow: hidden; 
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .view-section { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 25px;
            visibility: hidden; opacity: 0; z-index: 0; pointer-events: none;
            overflow-y: auto; transform: scale(0.98); transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .view-section.active { 
            visibility: visible; opacity: 1; z-index: 1; pointer-events: auto; transform: scale(1);
        }

        #song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .song-card { 
            padding: 15px; text-align: center; 
            background: rgba(0, 0, 0, 0.3); border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .song-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.05); border-color: rgba(79, 172, 254, 0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .song-card strong { margin-bottom: 5px; color: #fff; font-size: 14px; word-break: break-all; }
        
        .add-to-playlist-btn {
            width: 32px; height: 32px; flex-shrink: 0; margin-top: 10px;
            background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; font-weight: bold;
        }
        .add-to-playlist-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 10px #00f2fe; transform: scale(1.1); }
        .add-to-playlist-btn::before { content: '+'; margin-top: -2px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #4facfe; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 10px 15px; font-size: 14px;
            background: rgba(0, 0, 0, 0.4); color: #fff; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; transition: border 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #4facfe; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 10px rgba(79, 172, 254, 0.3); outline: none; }
        .form-group textarea { height: 120px; resize: vertical; }
        
        .btn-save-song { 
            padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: bold; border: none;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); color: #fff; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); margin-right: 10px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-save-song:hover { box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); transform: translateY(-2px); }
        .btn-export { background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%); box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3); }
        .btn-export:hover { box-shadow: 0 6px 20px rgba(56, 239, 125, 0.6); }

        #lyrics-content { 
            white-space: pre-wrap; font-size: 20px; line-height: 2; text-align: center; 
            color: #fff; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); text-shadow: 1px 1px 2px #000;
        }

        #view-youtube { padding: 0; }
        #youtube-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; position: relative; }
        .fallback-iframe { width: 100%; height: 100%; border: none; }

        #right-panel { 
            flex: 2.5; display: flex; flex-direction: column; z-index: 2; min-width: 250px;
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); overflow: hidden;
        }
        
        .controls-wrapper { display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; padding: 15px 10px 5px 10px; gap: 8px; justify-content: space-around; flex-wrap: wrap; }
        .loop-controls { padding: 5px 10px 15px 10px; border-top: 1px dashed rgba(255,255,255,0.05); }
        
        .btn-control { 
            flex: 1; height: 45px; min-width: 45px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; 
            display: inline-flex; justify-content: center; align-items: center; 
            cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-control:hover { background: rgba(255, 255, 255, 0.15); border-color: #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.4); transform: translateY(-2px); }

        .btn-vol { font-size: 16px; color: #fff; font-weight: bold; }
        
        .btn-loop { flex-direction: column; font-size: 13px; color: #fff; }
        .btn-loop span { font-size: 10px; color: #4facfe; margin-top: 2px; font-family: monospace; letter-spacing: 1px;}
        .btn-loop.active { border-color: #38ef7d; background: rgba(56, 239, 125, 0.1); box-shadow: 0 0 10px rgba(56, 239, 125, 0.3); }

        .icon-rewind::before, .icon-rewind::after { content: ''; display: block; border-style: solid; border-width: 8px 12px 8px 0; border-color: transparent #fff transparent transparent; position: absolute; top: 50%; transform: translateY(-50%); }
        .icon-rewind::before { left: 50%; margin-left: -12px; } .icon-rewind::after { left: 50%; margin-left: -2px; }

        .icon-fastforward::before, .icon-fastforward::after { content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px; border-color: transparent transparent transparent #fff; position: absolute; top: 50%; transform: translateY(-50%); }
        .icon-fastforward::before { left: 50%; margin-left: -10px; } .icon-fastforward::after { left: 50%; margin-left: 0px; }

        .icon-next::before { content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px; border-color: transparent transparent transparent #fff; margin-right: 4px; }
        .icon-next::after { content: ''; display: block; width: 3px; height: 16px; background-color: #fff; border-radius: 2px; }

        .playlist-area { padding: 15px; flex: 1; overflow-y: auto; }
        .playlist-area h3 { margin-top: 0; color: #4facfe; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: 16px; }
        #playlist-ul { list-style: none; padding: 0; margin: 0; }
        #playlist-ul li { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; 
            border-radius: 8px; margin-bottom: 5px; background: rgba(0,0,0,0.2); font-size: 14px;
        }
        #playlist-ul li:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        #playlist-ul li.playing { background: linear-gradient(90deg, rgba(79,172,254,0.3) 0%, rgba(0,242,254,0.3) 100%); border-left: 4px solid #00f2fe; color: #fff; font-weight: bold; }
        .remove-btn { color: #ff4b2b; cursor: pointer; background: rgba(255,75,43,0.1); border: none; font-size: 14px; width: 25px; height: 25px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .remove-btn:hover { background: #ff4b2b; color: #fff; box-shadow: 0 0 10px #ff4b2b; }

        .save-status-info { background: rgba(0, 0, 0, 0.4); border-left: 4px solid #4facfe; padding: 15px; border-radius: 0 8px 8px 0; margin-bottom: 20px; }
        .save-status-info strong { color: #fff; font-size: 16px; }
        .save-status-info ul { margin: 10px 0 0 20px; padding: 0; list-style: disc; color: #bbb; line-height: 1.6; font-size: 14px; }
        .highlight-gh { color: #00f2fe; font-weight: bold; }

        /* ✅ 修正 3：RWD 響應式設計 (手機與平板完美適配) */
        @media (max-width: 900px) {
            body { height: auto; overflow: auto; padding: 10px; }
            main { flex-direction: column; overflow: visible; gap: 15px; }
            
            /* 在手機上，左側（影片/歌詞）與右側（控制/清單）上下排列 */
            #left-panel { flex: none; height: 50vh; min-height: 350px; width: 100%; border-radius: 12px; }
            #right-panel { flex: none; height: auto; min-height: 400px; width: 100%; border-radius: 12px; }
            
            .view-section { position: absolute; } /* 保持 absolute 才能在框框內切換 */
            
            /* 新增與編輯在手機上改為上下排列 */
            .edit-container { flex-direction: column !important; }
            .edit-container > div { width: 100%; }
            
            header { padding: 15px; margin-bottom: 15px; }
            .title-area h1 { font-size: 22px; }
            .toolbar button { padding: 8px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>傑斯克的練歌世界</h1>
            <h2>Johsok’s KaLa OK (極致精美版)</h2>
        </div>
        <div class="toolbar">
            <button onclick="switchView('songs')" class="active">歌曲列表</button>
            
            <button id="btn-toggle-lyrics" onclick="toggleLyrics()" title="進歌詞">看歌詞</button>
            
            <button onclick="switchView('edit')">新增與編輯</button>
        </div>
    </header>

    <main>
        <div id="left-panel">
            <div id="view-songs" class="view-section active">
                <h3 style="color: #4facfe; margin-top:0;">歌曲庫</h3>
                <div id="song-grid"></div>
            </div>

            <div id="view-lyrics" class="view-section">
                <h3 id="lyrics-title" style="color: #4facfe; text-align: center; margin-top:0;">尚未播放歌曲</h3>
                <div id="lyrics-content">請先從播放列表選擇歌曲開始播放。</div>
            </div>

            <div id="view-youtube" class="view-section">
                <div id="youtube-container">
                    <div id="player" style="color:#666; font-size: 18px;">請從下方播放列表選擇歌曲。</div>
                </div>
            </div>

            <div id="view-edit" class="view-section">
                <div class="save-status-info">
                    <strong>歌曲儲存與雲端同步設定：</strong>
                    <ul>
                        <li><span class="highlight-gh">第一步：</span> 輸入歌名與連結，點擊「儲存至本地暫存」。</li>
                        <li><span class="highlight-gh">第二步：</span> 填寫下方 GitHub 資訊，點擊「一鍵同步至 GitHub」即可直接更新線上歌單！</li>
                    </ul>
                </div>

                <div class="edit-container" style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <h3 style="color: #4facfe; margin-top:0;">新增/編輯歌曲</h3>
                        <div class="form-group">
                            <label>歌曲名稱：</label>
                            <input type="text" id="edit-title" placeholder="輸入歌名">
                        </div>
                        <div class="form-group">
                            <label>Youtube 連結：</label>
                            <input type="text" id="edit-yt" placeholder="請貼上標準網址，例如: https://www.youtube.com/watch?v=K4DyBUG242c">
                        </div>
                        <div class="form-group">
                            <label>歌詞：</label>
                            <textarea id="edit-lyrics" placeholder="貼上歌詞..."></textarea>
                        </div>
                        <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                            <button onclick="saveSong()" class="btn-save-song">儲存至本地暫存</button>
                            <button onclick="exportJson()" class="btn-save-song" style="background: rgba(255,255,255,0.1); color:#ccc; box-shadow:none;">手動下載 JSON</button>
                        </div>
                    </div>

                    <div style="flex: 1; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2);">
                        <h3 style="color: #38ef7d; margin-top:0;">☁️ GitHub 一鍵同步設定</h3>
                        <div class="form-group">
                            <label style="color:#38ef7d;">GitHub 帳號 (Owner)：</label>
                            <input type="text" id="gh-owner" placeholder="例如: your-username">
                        </div>
                        <div class="form-group">
                            <label style="color:#38ef7d;">儲存庫名稱 (Repo)：</label>
                            <input type="text" id="gh-repo" placeholder="例如: my-kalaok">
                        </div>
                        <div class="form-group">
                            <label style="color:#38ef7d;">Johsok_KaLaOK_Key (Token)：</label>
                            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxx">
                        </div>
                        <button onclick="syncToGitHub()" class="btn-save-song btn-export" style="width: 100%; margin-top: 10px;">🚀 一鍵同步至 GitHub</button>
                        <p style="font-size: 11px; color: #888; margin-top: 10px; line-height: 1.5;">* 此安全設計將把 Token 存在您的瀏覽器中，而非寫入程式碼，防止外洩風險。</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="right-panel">
            <div class="controls-wrapper">
                <div class="controls">
                    <button class="btn-control btn-vol" onclick="adjustVolume(-10)" title="音量減小">➖</button>
                    <button class="btn-control btn-vol" onclick="adjustVolume(10)" title="音量增大">➕</button>
                    <button class="btn-control icon-rewind" onclick="seekVideo(-5)" title="回放5秒"></button>
                    <button class="btn-control icon-fastforward" onclick="seekVideo(5)" title="快轉5秒"></button>
                    <button class="btn-control icon-next" onclick="playNext()" title="下一首"></button>
                </div>
                <div class="controls loop-controls">
                    <button class="btn-control btn-loop" id="btn-loop-start" onclick="setLoopStart()" title="設定循環起點">開始<br><span>--:--</span></button>
                    <button class="btn-control btn-loop" id="btn-loop-end" onclick="setLoopEnd()" title="設定循環終點">結束<br><span>--:--</span></button>
                    <button class="btn-control btn-loop" onclick="clearLoop()" title="清除循環設定">✖<br><span>清除</span></button>
                </div>
            </div>
            <div class="playlist-area">
                <h3>播放列表</h3>
                <ul id="playlist-ul"></ul>
            </div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let songs = []; 
        let playlist = JSON.parse(localStorage.getItem('kalaok_playlist')) || [];
        let currentPlayIndex = -1;
        let player = null;

        let loopStart = null;
        let loopEnd = null;
        let loopInterval = null;

        function onYouTubeIframeAPIReady() {
            console.log("YouTube API 已準備就緒");
        }

        function extractVideoID(url) {
            let videoID = "";
            const match = url.match(/^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/);
            if (match && match[7].length == 11) {
                videoID = match[7];
            } else {
                 const parts = url.split('/');
                 const lastPart = parts[parts.length - 1];
                 const idPart = lastPart.split('?v=')[0]; 
                 videoID = idPart.length === 11 ? idPart : url; 
            }
            return videoID;
        }

        fetch('song.json')
            .then(response => {
                if (!response.ok) throw new Error("無 json 檔案");
                return response.json();
            })
            .then(data => {
                const localSongs = JSON.parse(localStorage.getItem('kalaok_songs')) || [];
                const existingIds = new Set(data.map(s => s.id));
                const mergedSongs = [...data];
                
                localSongs.forEach(ls => {
                    if (!existingIds.has(ls.id)) mergedSongs.push(ls);
                });
                songs = mergedSongs;
                renderSongGrid();
            })
            .catch(error => {
                songs = JSON.parse(localStorage.getItem('kalaok_songs')) || [];
                if(songs.length === 0) {
                    songs.push({
                        id: Date.now(),
                        title: "測試音樂 - NCS 無版權電音",
                        ytId: "K4DyBUG242c", 
                        lyrics: "這是一首保證可播放的無版權測試歌曲！\n\n因為很多官方 MV 會鎖住禁止在第三方網站播放，導致變成黑畫面。"
                    });
                    saveToStorage();
                }
                renderSongGrid();
            });

        // =========================================
        // 防彈級的 iframe 強制注入法
        // =========================================
        function playSong(index) {
            if (index < 0 || index >= playlist.length) return;
            currentPlayIndex = index;
            const song = playlist[index];
            
            // 換歌時強制切換回 YouTube 畫面
            switchView('youtube'); 
            
            clearLoop();

            if (!song.ytId || song.ytId.length !== 11) {
                alert("無效的 Youtube ID，請編輯該歌曲！");
                switchView('songs'); return;
            }

            const container = document.getElementById('youtube-container');
            const origin = window.location.origin; 

            container.innerHTML = `
                <iframe id="yt-iframe" class="fallback-iframe"
                    src="https://www.youtube.com/embed/${song.ytId}?autoplay=1&enablejsapi=1&origin=${origin}&rel=0" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            `;

            setTimeout(() => {
                if (typeof YT !== 'undefined' && YT.Player) {
                    player = new YT.Player('yt-iframe', {
                        events: {
                            'onStateChange': (event) => {
                                if (event.data === YT.PlayerState.ENDED) playNext();
                            }
                        }
                    });
                }
            }, 300);
            
            renderPlaylist();
            updateLyricsView();
        }

        // =========================================
        // 音量與片段循環控制
        // =========================================
        function adjustVolume(change) {
            if (player && typeof player.getVolume === 'function') {
                let currentVol = player.getVolume();
                let newVol = currentVol + change;
                if (newVol > 100) newVol = 100;
                if (newVol < 0) newVol = 0;
                player.setVolume(newVol);
            } else {
                console.log("播放器尚未完全載入，無法調整音量");
            }
        }

        function formatTime(seconds) {
            if (seconds === null || seconds === undefined) return "--:--";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function setLoopStart() {
            if (player && typeof player.getCurrentTime === 'function') {
                loopStart = player.getCurrentTime();
                document.getElementById('btn-loop-start').innerHTML = `開始<br><span>${formatTime(loopStart)}</span>`;
                document.getElementById('btn-loop-start').classList.add('active');
                checkLoopStatus();
            }
        }

        function setLoopEnd() {
            if (player && typeof player.getCurrentTime === 'function') {
                let currentTime = player.getCurrentTime();
                if (loopStart !== null && currentTime <= loopStart) {
                    alert("結束時間必須晚於開始時間喔！");
                    return;
                }
                loopEnd = currentTime;
                document.getElementById('btn-loop-end').innerHTML = `結束<br><span>${formatTime(loopEnd)}</span>`;
                document.getElementById('btn-loop-end').classList.add('active');
                checkLoopStatus();
            }
        }

        function clearLoop() {
            loopStart = null;
            loopEnd = null;
            if (loopInterval) clearInterval(loopInterval);
            document.getElementById('btn-loop-start').innerHTML = `開始<br><span>--:--</span>`;
            document.getElementById('btn-loop-end').innerHTML = `結束<br><span>--:--</span>`;
            document.getElementById('btn-loop-start').classList.remove('active');
            document.getElementById('btn-loop-end').classList.remove('active');
        }

        function checkLoopStatus() {
            if (loopInterval) clearInterval(loopInterval);
            if (loopStart !== null && loopEnd !== null) {
                loopInterval = setInterval(() => {
                    if (player && typeof player.getCurrentTime === 'function') {
                        if (player.getCurrentTime() >= loopEnd) {
                            player.seekTo(loopStart, true);
                        }
                    }
                }, 200);
            }
        }

        function seekVideo(seconds) {
            if (player && typeof player.getCurrentTime === 'function') {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime + seconds, true);
            } else {
                console.log("播放器正在載入中，或尚未開始播放");
            }
        }

        function playNext() {
            if (playlist.length === 0) return;
            let nextIndex = currentPlayIndex + 1;
            if (nextIndex >= playlist.length) nextIndex = 0; 
            playSong(nextIndex);
        }

        // =========================================
        // ✅ 修正 6：智慧判斷的 歌詞/影片 雙切換功能
        // =========================================
        function toggleLyrics() {
            // 檢查當前是否在歌詞畫面
            const isLyrics = document.getElementById('view-lyrics').classList.contains('active');
            
            // 如果是歌詞，就切回 Youtube；反之切到歌詞
            if (isLyrics) {
                switchView('youtube');
            } else {
                switchView('lyrics');
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            
            if (viewName === 'youtube') {
                document.getElementById('view-youtube').classList.add('active');
            } else {
                const targetView = document.getElementById(`view-${viewName}`);
                if (targetView) targetView.classList.add('active');
            }
            
            // 處理上方工具列按鈕狀態
            document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
            
            const lyricsBtn = document.getElementById('btn-toggle-lyrics');
            
            // 根據不同頁面動態改變「歌詞按鈕」的文字與 title 提示
            if (viewName === 'lyrics') {
                lyricsBtn.classList.add('active');
                lyricsBtn.title = "回Youtube畫面";
                lyricsBtn.innerText = "回影片";
            } else if (viewName === 'youtube') {
                lyricsBtn.classList.add('active');
                lyricsBtn.title = "進歌詞";
                lyricsBtn.innerText = "看歌詞";
            } else {
                // 如果是在歌曲列表或新增編輯頁面
                lyricsBtn.title = "進歌詞";
                lyricsBtn.innerText = "看歌詞";
                
                const activeBtn = Array.from(document.querySelectorAll('.toolbar button')).find(btn => btn.innerText.includes(viewName === 'edit' ? '新增與編輯' : '歌曲列表'));
                if(activeBtn) activeBtn.classList.add('active');
            }

            if (viewName === 'songs') renderSongGrid();
        }

        function renderSongGrid() {
            const grid = document.getElementById('song-grid');
            if(!grid) return;
            grid.innerHTML = '';
            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <strong>${song.title}</strong>
                    <button class="add-to-playlist-btn" onclick="addToPlaylist(${song.id})" title="加入播放列表"></button>
                `;
                grid.appendChild(card);
            });
        }

        function renderPlaylist() {
            const ul = document.getElementById('playlist-ul');
            ul.innerHTML = '';
            playlist.forEach((song, index) => {
                const li = document.createElement('li');
                if (index === currentPlayIndex) li.classList.add('playing');
                li.innerHTML = `
                    <span onclick="playSong(${index})" style="flex:1;">${index + 1}. ${song.title}</span>
                    <button class="remove-btn" onclick="removeFromPlaylist(${index})" title="移除">✖</button>
                `;
                ul.appendChild(li);
            });
        }

        function updateLyricsView() {
            if (currentPlayIndex >= 0 && currentPlayIndex < playlist.length) {
                const song = playlist[currentPlayIndex];
                document.getElementById('lyrics-title').innerText = song.title;
                document.getElementById('lyrics-content').innerText = song.lyrics || "無歌詞";
            } else {
                document.getElementById('lyrics-title').innerText = "尚未播放歌曲";
                document.getElementById('lyrics-content').innerText = "請先從播放列表選擇歌曲開始播放。";
            }
        }

        function addToPlaylist(songId) {
            const song = songs.find(s => s.id === songId);
            if (song) {
                playlist.push(song);
                localStorage.setItem('kalaok_playlist', JSON.stringify(playlist)); 
                renderPlaylist();
            }
        }

        function removeFromPlaylist(index) {
            playlist.splice(index, 1);
            if (index < currentPlayIndex) currentPlayIndex--;
            else if (index === currentPlayIndex) {
                currentPlayIndex = -1; 
                document.getElementById('youtube-container').innerHTML = '<div id="player" style="color:#666;">請從下方播放列表選擇歌曲。</div>';
            }
            localStorage.setItem('kalaok_playlist', JSON.stringify(playlist));
            renderPlaylist();
            updateLyricsView();
        }

        function saveSong() {
            const title = document.getElementById('edit-title').value.trim();
            const ytUrl = document.getElementById('edit-yt').value.trim();
            const lyrics = document.getElementById('edit-lyrics').value.trim();

            if (!title || !ytUrl) { alert("歌名與 Youtube 連結為必填！"); return; }

            const ytId = extractVideoID(ytUrl);
            if (ytId.length !== 11) { alert("無效的 Youtube ID，請確保連結正確。"); return; }

            songs.push({ id: Date.now(), title: title, ytId: ytId, lyrics: lyrics });
            saveToStorage();
            
            document.getElementById('edit-title').value = '';
            document.getElementById('edit-yt').value = '';
            document.getElementById('edit-lyrics').value = '';
            
            alert("✅ 歌曲已成功暫存！");
            switchView('songs'); 
        }

        function saveToStorage() {
            localStorage.setItem('kalaok_songs', JSON.stringify(songs));
            localStorage.setItem('kalaok_playlist', JSON.stringify(playlist));
        }

        function exportJson() {
            if(songs.length === 0) { alert("沒有歌曲可以匯出喔！"); return; }
            const dataStr = JSON.stringify(songs, null, 4);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "song.json"; 
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 0);
        }

        // =========================================
        // ✅ 修正 7：GitHub API 一鍵同步功能 (安全前端寫法)
        // =========================================
        const savedGhPrefs = JSON.parse(localStorage.getItem('kalaok_gh_prefs'));
        if (savedGhPrefs) {
            document.getElementById('gh-owner').value = savedGhPrefs.owner || '';
            document.getElementById('gh-repo').value = savedGhPrefs.repo || '';
            document.getElementById('gh-token').value = savedGhPrefs.token || '';
        }

        async function syncToGitHub() {
            const owner = document.getElementById('gh-owner').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const token = document.getElementById('gh-token').value.trim();
            const path = 'song.json';

            if (!owner || !repo || !token) {
                alert("⚠️ 請完整填寫 GitHub 的帳號、儲存庫與 Token！");
                return;
            }

            const confirmSync = confirm("即將覆蓋 GitHub 上的 song.json，確定執行嗎？");
            if (!confirmSync) return;

            try {
                // 1. 取得 GitHub 上舊檔案的 SHA 值
                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const getRes = await fetch(getUrl, { 
                    headers: { 'Authorization': `token ${token}` } 
                });
                
                let sha = null;
                if (getRes.ok) {
                    const getData = await getRes.json();
                    sha = getData.sha;
                } else if (getRes.status !== 404) {
                    throw new Error("無法取得舊檔案資訊，請檢查設定與 Token 權限。");
                }

                // 2. 將歌曲陣列轉為 JSON，並進行 Base64 編碼以防中文亂碼
                const contentStr = JSON.stringify(songs, null, 4);
                const base64Content = btoa(unescape(encodeURIComponent(contentStr)));

                // 3. 透過 PUT 請求更新檔案
                const putRes = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Auto-sync song.json from KaLa OK Web App",
                        content: base64Content,
                        sha: sha 
                    })
                });

                if (putRes.ok) {
                    alert("🎉 同步成功！GitHub 上的歌單已更新。");
                    localStorage.setItem('kalaok_gh_prefs', JSON.stringify({ owner, repo, token }));
                } else {
                    const errorData = await putRes.json();
                    alert(`❌ 同步失敗: ${errorData.message}`);
                }

            } catch(e) {
                console.error(e);
                alert("發生錯誤，請檢查 F12 控制台資訊。");
            }
        }

        renderPlaylist();
        switchView('songs');
    </script>
</body>
</html>
