<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傑斯克的練歌世界 Johsok's  Karaoke</title>
    <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
    <style>
        /* =========================================
            極致精美版：全域基礎重置與排版 
            ========================================= */
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; }
        button, .song-card, #playlist-ul li, .add-to-playlist-btn { transition: all 0.3s ease; }

        /* 自訂滾動條 (Webkit) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        body { 
            margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #e0e0e0; 
            overflow: hidden;
        }
        
        header { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            padding: 20px 30px; margin-bottom: 20px; 
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); text-align: center;
        }
        .title-area h1 { margin: 0; font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .title-area h2 { margin: 5px 0 0 0; font-size: 16px; color: #4facfe; font-weight: bold; letter-spacing: 1px; }
        
        .toolbar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .toolbar button { 
            padding: 10px 20px; cursor: pointer; font-size: 15px; font-weight: bold;
            background: rgba(255, 255, 255, 0.05); color: #ccc; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; 
        }
        .toolbar button:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: translateY(-2px); }
        .toolbar button.active { 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); 
            color: #fff; border: none; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); 
        }
        
        /* AI 自動新增按鈕特殊樣式 */
        .btn-ai-add {
            background: linear-gradient(90deg, #8E2DE2 0%, #4A00E0 100%) !important;
            color: #fff !important; border: none !important;
        }
        .btn-ai-add:hover:not(:disabled) { box-shadow: 0 4px 15px rgba(142, 45, 226, 0.5) !important; transform: translateY(-2px); }

        /* 批量刪除按鈕特殊樣式 */
        .btn-batch-delete {
            background: rgba(255, 75, 43, 0.8) !important;
            color: #fff !important; border: none !important;
        }
        .btn-batch-delete:hover { box-shadow: 0 4px 15px rgba(255, 75, 43, 0.5) !important; transform: translateY(-2px); }

        main { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        
        #left-panel { 
            flex: 7.5; position: relative; overflow: hidden; 
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        /* 全螢幕模式的 CSS */
        .fullscreen-active #left-panel {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            border-radius: 0 !important;
            background: #000 !important;
        }

        #btn-exit-fs {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10000;
            padding: 10px 20px;
            background: rgba(255, 75, 43, 0.8);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        #btn-exit-fs:hover { background: #ff4b2b; transform: scale(1.05); }
        .fullscreen-active #btn-exit-fs { display: block; } /* 全螢幕時才顯示回上頁按鈕 */
        
        .view-section { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 25px;
            visibility: hidden; opacity: 0; z-index: 0; pointer-events: none;
            overflow-y: auto; transform: scale(0.98); transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .view-section.active { 
            visibility: visible; opacity: 1; z-index: 1; pointer-events: auto; transform: scale(1);
        }

        /* 音樂卡片與 UI */
        #song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .song-card { 
            padding: 22px 8px 10px 8px; text-align: center; 
            background: rgba(0, 0, 0, 0.3); border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; 
        }
        .song-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.05); border-color: rgba(79, 172, 254, 0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .song-card strong { margin-bottom: 8px; color: #fff; font-size: 12px; word-break: break-all; line-height: 1.3; }
        
        /* 批量刪除的 Checkbox 樣式 */
        .song-select-cb {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: #ff4b2b; 
        }

        .card-btn-group { display: flex; gap: 6px; margin-top: auto; }
        
        /* 統一按鈕小巧風格 */
        .add-to-playlist-btn, .edit-song-btn {
            width: 28px; height: 28px; flex-shrink: 0; 
            border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        .add-to-playlist-btn { background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; }
        .add-to-playlist-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 10px #00f2fe; transform: scale(1.1); }
        .add-to-playlist-btn::before { content: '+'; margin-top: -2px; }

        .edit-song-btn { background: rgba(255, 193, 7, 0.1); color: #ffc107; }
        .edit-song-btn:hover { background: #ffc107; color: #000; box-shadow: 0 0 10px #ffc107; transform: scale(1.1); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #4facfe; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 10px 15px; font-size: 14px;
            background: rgba(0, 0, 0, 0.4); color: #fff; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; transition: border 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #4facfe; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 10px rgba(79, 172, 254, 0.3); outline: none; }
        .form-group textarea { height: 120px; resize: vertical; }
        
        .btn-save-song { 
            padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: bold; border: none;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); color: #fff; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-save-song:hover { box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); transform: translateY(-2px); }
        
        /* 拖曳排序列表 CSS */
        .sortable-list { list-style: none; padding: 0; margin: 0; }
        .sortable-item { 
            display: flex; align-items: center; padding: 10px; margin-bottom: 8px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            transition: background 0.2s;
        }
        .sortable-item.dragging, #playlist-ul li.dragging { opacity: 0.8; background: rgba(79, 172, 254, 0.5); border-color: #00f2fe; }
        .sortable-item.drag-over, #playlist-ul li.drag-over { border: 2px dashed #00f2fe; }
        .drag-handle { cursor: grab; padding: 0 15px 0 5px; font-size: 18px; color: #aaa; }
        .drag-handle:active { cursor: grabbing; }

        #lyrics-content { 
            white-space: pre-wrap; font-size: 20px; line-height: 2; text-align: center; 
            color: #fff; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); text-shadow: 1px 1px 2px #000;
        }

        #view-youtube { padding: 0; }
        #youtube-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; position: relative; }
        .fallback-iframe { width: 100%; height: 100%; border: none; }

        #right-panel { 
            flex: 2.5; display: flex; flex-direction: column; z-index: 2; min-width: 250px;
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); overflow: hidden;
        }
        
        .controls-wrapper { display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; padding: 15px 10px 5px 10px; gap: 8px; justify-content: space-around; flex-wrap: wrap; }
        .loop-controls { padding: 5px 10px 15px 10px; border-top: 1px dashed rgba(255,255,255,0.05); }
        
        /* YouTube 播放進度拉桿 CSS */
        .progress-controls {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        #yt-progress-bar {
            -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px;
            background: rgba(255,255,255,0.2); outline: none; cursor: pointer;
        }
        #yt-progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: #00f2fe; cursor: pointer; transition: transform 0.1s;
        }
        #yt-progress-bar::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .btn-control { 
            flex: 1; height: 45px; min-width: 40px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; 
            display: inline-flex; justify-content: center; align-items: center; 
            cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 16px; color: #fff; font-weight: bold;
        }
        .btn-control:hover { background: rgba(255, 255, 255, 0.15); border-color: #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.4); transform: translateY(-2px); }
        
        .btn-loop { flex-direction: column; font-size: 13px; color: #fff; }
        .btn-loop span { font-size: 10px; color: #4facfe; margin-top: 2px; font-family: monospace; letter-spacing: 1px;}
        .btn-loop.active { border-color: #38ef7d; background: rgba(56, 239, 125, 0.1); box-shadow: 0 0 10px rgba(56, 239, 125, 0.3); }

        .icon-rewind::before, .icon-rewind::after { content: ''; display: block; border-style: solid; border-width: 8px 12px 8px 0; border-color: transparent #fff transparent transparent; position: absolute; top: 50%; transform: translateY(-50%); }
        .icon-rewind::before { left: 50%; margin-left: -12px; } .icon-rewind::after { left: 50%; margin-left: -2px; }

        .icon-fastforward::before, .icon-fastforward::after { content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px; border-color: transparent transparent transparent #fff; position: absolute; top: 50%; transform: translateY(-50%); }
        .icon-fastforward::before { left: 50%; margin-left: -10px; } .icon-fastforward::after { left: 50%; margin-left: 0px; }

        .icon-fullscreen::before {
            content: ''; display: block; width: 14px; height: 14px;
            border: 2px solid #fff; border-radius: 2px; transition: all 0.2s;
        }

        .playlist-area { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column;}
        
        /* 播放列表 Header 設計 */
        .playlist-header {
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px;
        }
        .playlist-header h3 { margin: 0; color: #4facfe; font-size: 16px; border: none; padding: 0;}
        .playlist-actions { display: flex; gap: 5px; }
        .playlist-actions button {
            padding: 5px 8px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #fff;
            transition: all 0.2s;
        }
        .btn-save-pl { background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%); }
        .btn-save-pl:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(56, 239, 125, 0.5); }
        .btn-clear-pl { background: rgba(255, 75, 43, 0.8); }
        .btn-clear-pl:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(255, 75, 43, 0.5); }

        #playlist-ul { list-style: none; padding: 0; margin: 0; }
        #playlist-ul li { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; 
            border-radius: 8px; margin-bottom: 5px; background: rgba(0,0,0,0.2); font-size: 14px;
        }
        #playlist-ul li:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        #playlist-ul li.playing { background: linear-gradient(90deg, rgba(79,172,254,0.3) 0%, rgba(0,242,254,0.3) 100%); border-left: 4px solid #00f2fe; color: #fff; font-weight: bold; }
        
        .drag-handle-playlist { cursor: grab; padding-right: 10px; font-size: 16px; color: #aaa; display: inline-block; }
        .drag-handle-playlist:active { cursor: grabbing; }

        .remove-btn { color: #ff4b2b; cursor: pointer; background: rgba(255,75,43,0.1); border: none; font-size: 14px; width: 25px; height: 25px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: all 0.2s; flex-shrink: 0;}
        .remove-btn:hover { background: #ff4b2b; color: #fff; box-shadow: 0 0 10px #ff4b2b; }

        .save-status-info { background: rgba(0, 0, 0, 0.4); border-left: 4px solid #4facfe; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .save-status-info strong { color: #fff; font-size: 16px; }

        /* 自訂 Toast 氣泡提示樣式 */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100001; display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(20, 30, 40, 0.95); color: #fff; padding: 12px 24px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(79, 172, 254, 0.5); text-align: center; font-weight: bold;
            opacity: 1; transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateY(0);
        }

        /* RWD 響應式設計 */
        @media (max-width: 900px) {
            body { height: auto; overflow: auto; padding: 10px; }
            main { flex-direction: column; overflow: visible; gap: 15px; }
            
            #left-panel { flex: none; height: 50vh; min-height: 350px; width: 100%; border-radius: 12px; }
            #right-panel { flex: none; height: auto; min-height: 400px; width: 100%; border-radius: 12px; }
            
            .view-section { position: absolute; }
            
            header { padding: 15px; margin-bottom: 15px; }
            .title-area h1 { font-size: 22px; }
            .toolbar button { padding: 8px 15px; font-size: 14px; }
            
            .controls { gap: 8px; }
            .btn-control { min-width: 40px; height: 45px; }
            
            #lyrics-content {
                font-size: 16px; 
                padding: 15px;
                line-height: 1.6;
                word-break: break-word; 
            }
            #song-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        }
    </style>
</head>
<body>

    <audio id="bg-audio-keepalive" loop playsinline>
        <source src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" type="audio/mpeg">
    </audio>

    <div id="toast-container"></div>

    <header>
        <div class="title-area">
            <h1>傑．斯．克 的 練 歌 世 界</h1>
            <h2>Johsok’s  Karaoke</h2>
        </div>
        <div class="toolbar">
            <button onclick="switchView('songs')" class="active">歌曲列表</button>
            <button id="btn-toggle-lyrics" onclick="toggleLyrics()" title="進歌詞">看歌詞</button>
            <button onclick="switchView('edit')">新增與編輯</button>
        </div>
    </header>

    <main>
        <div id="left-panel">
            <button id="btn-exit-fs" onclick="toggleCustomFullscreen()">回上頁 ✖</button>

            <div id="view-songs" class="view-section active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h3 style="color: #4facfe; margin:0;">歌曲庫</h3>
                        <span id="ai-status-text" style="font-size: 13px; font-weight: bold; padding: 4px 10px; border-radius: 12px; display: none;"></span>
                    </div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button onclick="sortLibraryByStrokes()" style="padding: 4px 10px; font-size: 12px; border-radius: 12px; border: 1px solid #4facfe; background: rgba(0,0,0,0.3); color: #4facfe; cursor: pointer; line-height: 1.2; text-align: center; transition: 0.3s;" onmouseover="this.style.background='rgba(79,172,254,0.1)'" onmouseout="this.style.background='rgba(0,0,0,0.3)'" title="僅在目前畫面依筆劃排序顯示，不存入資料庫">依筆劃<br>排序</button>
                        <button onclick="batchDeleteSongs()" class="btn-batch-delete" style="padding: 4px 10px; font-size: 12px; border-radius: 12px; cursor: pointer; line-height: 1.2; text-align: center;" title="批次刪除已勾選的歌曲">🗑️批量<br>刪除</button>
                        <button id="btn-ai-add" onclick="autoAddSongs()" class="btn-ai-add" style="padding: 4px 10px; font-size: 12px; border-radius: 12px; cursor: pointer; line-height: 1.2; text-align: center;" title="呼叫 Gemini 自動找歌入庫">✨AI找<br>新歌</button>
                    </div>
                </div>
                <div id="song-grid">載入中...</div>
            </div>

            <div id="view-lyrics" class="view-section">
                <h3 id="lyrics-title" style="color: #4facfe; text-align: center; margin-top:0;">尚未播放歌曲</h3>
                <div id="lyrics-content">請先從播放列表選擇歌曲開始播放。</div>
            </div>

            <div id="view-youtube" class="view-section">
                <div id="youtube-container">
                    <div id="yt-player-placeholder" style="color:#666; font-size: 18px;">請從下方播放列表選擇歌曲。</div>
                </div>
            </div>

            <div id="view-edit" class="view-section">
                <div class="edit-container" style="max-width: 600px; margin: 0 auto;">
                    <div class="save-status-info">
                        <strong>點擊儲存將直接同步至 Supabase 雲端資料庫！<br>(未登入者會跳出密碼輸入視窗，密碼輸入成功將自動記憶)</strong>
                    </div>

                    <h3 id="form-mode-title" style="color: #4facfe; margin-top:0;">新增歌曲</h3>
                    <div class="form-group">
                        <label>歌曲名稱：</label>
                        <input type="text" id="edit-title" placeholder="輸入歌名">
                    </div>
                    <div class="form-group">
                        <label>Youtube 連結：</label>
                        <input type="text" id="edit-yt" placeholder="請貼上標準網址，例如: [https://www.youtube.com/watch?v=K4DyBUG242c](https://www.youtube.com/watch?v=K4DyBUG242c)">
                    </div>
                    <div class="form-group">
                        <label>歌詞：</label>
                        <textarea id="edit-lyrics" placeholder="貼上歌詞..."></textarea>
                    </div>
                    <div style="margin-top: 15px; margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <button onclick="saveSong()" id="btn-save-song" class="btn-save-song" style="flex: 1; text-align: center;">新增至雲端 (Supabase)</button>
                        <button onclick="cancelEdit()" id="btn-cancel-edit" class="btn-save-song" style="display: none; background: rgba(255,255,255,0.1); box-shadow:none;">取消編輯</button>
                    </div>

                    <hr style="border-color: rgba(255,255,255,0.1); margin-bottom: 20px;">
                    <h3 style="color: #4facfe; margin-top:0; display:flex; justify-content: space-between; align-items:center;">
                        管理歌曲順序 (拖曳排序)
                        <div style="display: flex; gap: 8px;">
                            <button onclick="sortEditListByStrokes()" class="btn-save-song" style="margin:0; font-size:12px; padding: 5px 10px; background: rgba(255,193,7,0.15); border: 1px solid #ffc107; color: #ffc107; box-shadow:none;" title="依筆劃重新排列所有歌曲">🔠 依筆劃排序</button>

        // 核心 API 處理工具
        const fetchWithRetry = async (url, options, retries = 3) => {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `HTTP 錯誤! 狀態碼: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise((res) => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        };

        // =========================================
        // AI 自動找歌 (無感背景執行 + 高速原生 JSON + 不卡死)
        // =========================================
        async function autoAddSongs() {
            const isAuthorized = await requireLogin();
            if (!isAuthorized) return;

            const apiKey = await getGeminiApiKey();
            if (!apiKey) return;

            const aiStatusText = document.getElementById('ai-status-text');
            const btnAiAdd = document.getElementById('btn-ai-add');
            
            // 變更 UI 狀態：顯示背景載入中
            aiStatusText.style.display = 'inline-block';
            aiStatusText.innerHTML = '⏳ 正在 AI 找新歌...';
            aiStatusText.style.color = '#ffc107';
            aiStatusText.style.background = 'rgba(255, 193, 7, 0.1)';
            aiStatusText.style.border = '1px solid rgba(255, 193, 7, 0.3)';
            
            btnAiAdd.disabled = true;
            btnAiAdd.style.opacity = '0.5';
            btnAiAdd.style.cursor = 'not-allowed';

            const currentTitles = songs.map(s => s.title).join(", ");
            
            const promptText = `請基於你的內部知識庫，推薦 5 首台灣 KTV 歷年來「熱度極高、排行前 100 名以內」的必點【國語流行歌曲】。
⚠️ 條件嚴格限制：
1. 語言限制：只能是「國語(中文)」歌曲，絕對拒絕且不要包含台語歌、粵語歌、英語歌或國外歌曲！
2. 真實連結："ytUrl" 必須是真實存在的 YouTube 影片網址 (例如 [https://www.youtube.com/watch?v=](https://www.youtube.com/watch?v=)...)。請基於你龐大的訓練資料，提供這些華語經典神曲真實且最廣為人知的 YouTube ID，絕對不可隨機捏造亂碼！
3. 完整歌詞："lyrics" 必須是【完整無刪減】的整首歌詞。
4. 不可重複：絕對不要與以下歌曲重複：${currentTitles}。

請回傳包含 5 首歌曲的 JSON 陣列。包含欄位：
- "title": 歌曲名稱(含歌手)
- "ytUrl": 真實有效的 YouTube 網址
- "lyrics": 完整無刪減的歌詞`;

            try {
                const modelName = 'gemini-2.5-flash';
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: { 
                        response_mime_type: "application/json",
                        maxOutputTokens: 8192 
                    },
                    model: modelName
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 安全擷取回傳文字
                let textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!textResult) {
                    throw new Error("AI 未回傳有效內容，請稍後再試。");
                }
                
                // 新增修正：過濾 AI 回傳可能附帶的 Markdown 語法 (```json ... ```)，避免 JSON 解析失敗
                let cleanedText = textResult.replace(/```[a-zA-Z]*\n?/g, '').replace(/```/g, '').trim();

                let newSongs;
                try {
                    newSongs = JSON.parse(cleanedText);
                } catch (parseErr) {
                    console.error("【JSON 解析失敗】AI 回傳的原始文字如下：\n", textResult);
                    throw new Error("AI 產生的資料格式發生異常，請重試。");
                }

                if (Array.isArray(newSongs) && newSongs.length > 0) {
                    
                    if (songs.length > 0) {
                        const fixPromises = songs.map((s, idx) => {
                            if (s.sort_order !== idx) {
                                return supabaseClient.from('songs').update({ sort_order: idx }).eq('id', s.id);
                            }
                            return null;
                        }).filter(p => p !== null);
                        
                        if (fixPromises.length > 0) await Promise.all(fixPromises);
                    }

                    const startOrder = songs.length;

                    const insertData = newSongs.map((s, i) => {
                        // 新增修正：容錯處理，避免 AI 產生的 key 名稱有誤差 (如 youtubeUrl, url 等) 或沒有產生
                        let ytUrl = s.ytUrl || s.youtubeUrl || s.url || s.link || "";
                        let yID = extractVideoID(ytUrl);
                        if (!yID || yID.length !== 11) yID = "dQw4w9WgXcQ"; 
                        
                        let title = s.title || s.name || "未知歌曲";
                        let lyrics = s.lyrics || s.lyric || s.text || "暫無歌詞";

                        return {
                            id: Date.now() + i, // 新增修正：避免迴圈執行過快導致時間戳重複，加上 index i
                            title: title,
                            ytId: yID,
                            lyrics: lyrics,
                            sort_order: startOrder + i 
                        };
                    });

                    const { error } = await supabaseClient.from('songs').insert(insertData);
                    if (error) {
                        console.error("Supabase 寫入錯誤細節：", error);
                        throw new Error(`資料庫寫入失敗: ${error.message || '未知錯誤'}`);
                    }

                    // 改變狀態為成功
                    aiStatusText.innerHTML = `✅ 已抓完 ${insertData.length} 首新歌`;
                    aiStatusText.style.color = '#38ef7d';
                    aiStatusText.style.background = 'rgba(56, 239, 125, 0.1)';
                    aiStatusText.style.border = '1px solid rgba(56, 239, 125, 0.3)';
                    setTimeout(() => { aiStatusText.style.display = 'none'; }, 5000);

                    await fetchSongsFromSupabase(); 
                }

            } catch (err) {
                console.error(err);
                showToast(`❌ 自動新增發生錯誤：\n${err.message}`, 4000);
                
                aiStatusText.innerHTML = '❌ 抓歌失敗';
                aiStatusText.style.color = '#ff4b2b';
                aiStatusText.style.background = 'rgba(255, 75, 43, 0.1)';
                aiStatusText.style.border = '1px solid rgba(255, 75, 43, 0.3)';
                setTimeout(() => { aiStatusText.style.display = 'none'; }, 5000);

                if (err.message.includes("API key not valid") || err.message.includes("API Key") || err.message.includes("Google 端") || err.message.includes("not found")) {
                    localStorage.removeItem('gemini_api_key');
                }
            } finally {
                // 恢復按鈕狀態
                btnAiAdd.disabled = false;
                btnAiAdd.style.opacity = '1';
                btnAiAdd.style.cursor = 'pointer';
            }
        }

        // =========================================
        // 歌曲拖曳排序並存回 Supabase
        // =========================================
        let dragSrcEl = null;

        function sortLibraryByStrokes() {
            if (songs.length === 0) return;
            const sortedSongs = [...songs].sort((a, b) => a.title.localeCompare(b.title, 'zh-TW'));
            renderSongGrid(sortedSongs);
            showToast("🔠 歌曲庫已依筆劃排序顯示 (僅變更顯示，未存入資料庫)");
        }

        function sortEditListByStrokes() {
            if (songs.length === 0) return;
            
            songs.sort((a, b) => a.title.localeCompare(b.title, 'zh-TW'));
            
            songs.forEach((song, index) => {
                song.sort_order = index;
            });

            renderEditSongList(); 
            renderSongGrid(); 
            showToast("🔠 已依筆劃排序！請點擊右方「💾 儲存排序」正式寫入資料庫。");
        }

        function renderEditSongList() {
            const list = document.getElementById('edit-song-list');
            if (!list) return;
            list.innerHTML = '';
            
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = 'sortable-item';
                li.draggable = true;
                li.dataset.id = song.id;
                li.innerHTML = `
                    <div class="drag-handle" title="按住拖曳">☰</div>
                    <div style="color:#fff; flex:1; font-size:14px;">${song.title}</div>
                `;
                
                li.addEventListener('dragstart', function(e) {
                    dragSrcEl = this;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/html', this.innerHTML);
                    this.classList.add('dragging');
                });
                li.addEventListener('dragover', function(e) {
                    if (e.preventDefault) e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    return false;
                });
                li.addEventListener('dragenter', function(e) { this.classList.add('drag-over'); });
                li.addEventListener('dragleave', function(e) { this.classList.remove('drag-over'); });
                li.addEventListener('drop', function(e) {
                    if (e.stopPropagation) e.stopPropagation();
                    if (dragSrcEl !== this) {
                        const srcId = parseInt(dragSrcEl.dataset.id);
                        const targetId = parseInt(this.dataset.id);
                        const srcIndex = songs.findIndex(s => s.id === srcId);
                        const targetIndex = songs.findIndex(s => s.id === targetId);
                        
                        const [movedItem] = songs.splice(srcIndex, 1);
                        songs.splice(targetIndex, 0, movedItem);
                        
                        renderEditSongList(); 
                        renderSongGrid();    
                    }
                    return false;
                });
                li.addEventListener('dragend', function(e) {
                    this.classList.remove('dragging');
                    document.querySelectorAll('.sortable-item').forEach(item => item.classList.remove('drag-over'));
                });
                
                list.appendChild(li);
            });
        }

        async function saveSongOrder() {
            const isAuthorized = await requireLogin();
            if (!isAuthorized) return;

            try {
                showToast("⏳ 正在儲存歌曲排序...", 1000); 
                const updatePromises = songs.map((song, index) => {
                    return supabaseClient.from('songs').update({ sort_order: index }).eq('id', song.id); 
                });
                await Promise.all(updatePromises);
                showToast("✅ 歌曲排序已成功更新至 Supabase！");
            } catch (err) {
                console.error("更新排序失敗:", err);
                alert(`❌ 儲存排序時發生錯誤：\n${err.message}`);
            }
        }

        // =========================================
        // 播放列表的雲端儲存與讀取
        // =========================================

        async function savePlaylistToDB() {
            const isAuthorized = await requireLogin();
            if (!isAuthorized) return;

            try {
                showToast("⏳ 正在將播放列表同步至雲端...", 1000); 

                const { error: deleteError } = await supabaseClient.from('saved_playlist').delete().neq('id', 0); 
                if (deleteError) throw deleteError;
                
                const insertData = playlist.map((song, index) => ({
                    id: Date.now() + index, 
                    ytId: song.ytId,
                    title: song.title,
                    sort_order: index,
                    lyrics: song.lyrics || "" 
                }));

                if (insertData.length > 0) {
                    const { error: insertError } = await supabaseClient.from('saved_playlist').insert(insertData);
                    if (insertError) throw insertError;
                }
                showToast("✅ 播放列表已成功儲存至雲端！下次開啟將自動載入。");
            } catch (e) {
                console.error("⚠️ 同步播放列表失敗", e);
                alert(`❌ 儲存失敗！\n錯誤原因：${e.message}\n請確保 Supabase 已建立 'saved_playlist' 資料表且具備對應欄位 (id, ytId, title, lyrics, sort_order) 並開啟 RLS 權限。`);
            }
        }

        async function loadPlaylistFromDB() {
            try {
                if (!supabaseClient) return;

                const { data, error } = await supabaseClient
                    .from('saved_playlist')
                    .select('*')
                    .order('sort_order', { ascending: true });
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    playlist = data;
                    localStorage.setItem('kalaok_playlist', JSON.stringify(playlist)); 
                    renderPlaylist();
                    showToast("☁️ 已成功從雲端資料庫載入您的播放列表");
                }
            } catch(e) {
                console.warn("無法從雲端載入播放列表，目前使用本地紀錄", e);
            }
        }

        // =========================================
        // 播放、進度條與介面邏輯
        // =========================================

        function initProgressBar() {
            const progressBar = document.getElementById('yt-progress-bar');
            const currentTimeDisplay = document.getElementById('yt-current-time');
            
            if (!progressBar || !currentTimeDisplay) return;

            progressBar.addEventListener('input', () => {
                isDraggingProgress = true;
                if (player && typeof player.getDuration === 'function') {
                    const duration = player.getDuration();
                    const seekToTime = (progressBar.value / 100) * duration;
                    currentTimeDisplay.innerText = formatTime(seekToTime);
                }
            });

            progressBar.addEventListener('change', () => {
                if (player && typeof player.getDuration === 'function') {
                    const duration = player.getDuration();
                    const seekToTime = (progressBar.value / 100) * duration;
                    player.seekTo(seekToTime, true);
                }
                isDraggingProgress = false;
            });

            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (player && typeof player.getCurrentTime === 'function' && !isDraggingProgress) {
                    const currentTime = player.getCurrentTime();
                    const duration = player.getDuration();
                    if (duration > 0) {
                        progressBar.value = (currentTime / duration) * 100;
                        currentTimeDisplay.innerText = formatTime(currentTime);
                        document.getElementById('yt-duration').innerText = formatTime(duration);
                    }
                }
            }, 500);
        }

        function extractVideoID(url) {
            // 新增修正：防止因為 url 為 undefined 或 null 導致 .match 報錯卡死
            if (!url) return ""; 
            url = String(url);
            
            let videoID = "";
            const match = url.match(/^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/);
            if (match && match[7].length == 11) {
                videoID = match[7];
            } else {
                 const parts = url.split('/');
                 const lastPart = parts[parts.length - 1];
                 const idPart = lastPart.split('?v=')[0]; 
                 videoID = idPart.length === 11 ? idPart : url; 
            }
            return videoID;
        }

        function playSong(index) {
            if (index < 0 || index >= playlist.length) return;

            if (typeof YT === 'undefined' || !YT.Player) {
                showToast("⚠️ YouTube 播放器尚未準備好，請稍等一秒再試...", 3000);
                return;
            }

            currentPlayIndex = index;
            const song = playlist[index];
            
            switchView('youtube'); 
            clearLoop();

            if (!song.ytId || song.ytId.length !== 11) {
                alert("無效的 Youtube ID，請編輯該歌曲！");
                switchView('songs'); return;
            }

            const origin = window.location.origin; 
            const container = document.getElementById('youtube-container');

            if (!player) {
                container.innerHTML = `<div id="yt-iframe" class="fallback-iframe"></div>`;
                player = new YT.Player('yt-iframe', {
                    videoId: song.ytId,
                    playerVars: { 
                        'autoplay': 1, 'enablejsapi': 1, 'origin': origin, 'rel': 0, 'playsinline': 1 
                    },
                    events: {
                        'onReady': (event) => { event.target.playVideo(); },
                        'onStateChange': (event) => {
                            if (event.data === YT.PlayerState.ENDED) playNext();
                        }
                    }
                });
            } else {
                player.loadVideoById(song.ytId);
            }
            
            renderPlaylist();
            updateLyricsView();
        }

        function togglePlayPause() {
            if (player && typeof player.getPlayerState === 'function') {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) { player.pauseVideo(); } 
                else { player.playVideo(); }
            }
        }

        function clearPlaylist() {
            if (playlist.length === 0) return;
            if (!confirm("確定要清空整個播放列表嗎？")) return;
            
            playlist = [];
            currentPlayIndex = -1;
            if (player && typeof player.stopVideo === 'function') {
                player.stopVideo();
            }
            document.getElementById('youtube-container').innerHTML = '<div id="yt-player-placeholder" style="color:#666; font-size: 18px;">請從下方播放列表選擇歌曲。</div>';
            player = null; 
            
            document.getElementById('yt-progress-bar').value = 0;
            document.getElementById('yt-current-time').innerText = "00:00";
            document.getElementById('yt-duration').innerText = "00:00";

            localStorage.setItem('kalaok_playlist', JSON.stringify(playlist));
            renderPlaylist();
            updateLyricsView();
            showToast("🗑️ 播放列表已清空。");
        }

        function adjustVolume(change) {
            if (player && typeof player.getVolume === 'function') {
                let currentVol = player.getVolume();
                let newVol = currentVol + change;
                if (newVol > 100) newVol = 100;
                if (newVol < 0) newVol = 0;
                player.setVolume(newVol);
            }
        }

        function formatTime(seconds) {
            if (seconds === null || seconds === undefined || isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function setLoopStart() {
            if (player && typeof player.getCurrentTime === 'function') {
                loopStart = player.getCurrentTime();
                document.getElementById('btn-loop-start').innerHTML = `開始<br><span>${formatTime(loopStart)}</span>`;
                document.getElementById('btn-loop-start').classList.add('active');
                checkLoopStatus();
            }
        }

        function setLoopEnd() {
            if (player && typeof player.getCurrentTime === 'function') {
                let currentTime = player.getCurrentTime();
                if (loopStart !== null && currentTime <= loopStart) {
                    alert("結束時間必須晚於開始時間喔！");
                    return;
                }
                loopEnd = currentTime;
                document.getElementById('btn-loop-end').innerHTML = `結束<br><span>${formatTime(loopEnd)}</span>`;
                document.getElementById('btn-loop-end').classList.add('active');
                checkLoopStatus();
            }
        }

        function clearLoop() {
            loopStart = null;
            loopEnd = null;
            if (loopInterval) clearInterval(loopInterval);
            document.getElementById('btn-loop-start').innerHTML = `開始<br><span>--:--</span>`;
            document.getElementById('btn-loop-end').innerHTML = `結束<br><span>--:--</span>`;
            document.getElementById('btn-loop-start').classList.remove('active');
            document.getElementById('btn-loop-end').classList.remove('active');
        }

        function checkLoopStatus() {
            if (loopInterval) clearInterval(loopInterval);
            if (loopStart !== null && loopEnd !== null) {
                loopInterval = setInterval(() => {
                    if (player && typeof player.getCurrentTime === 'function') {
                        if (player.getCurrentTime() >= loopEnd) {
                            player.seekTo(loopStart, true);
                        }
                    }
                }, 200);
            }
        }

        function seekVideo(seconds) {
            if (player && typeof player.getCurrentTime === 'function') {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime + seconds, true);
            }
        }

        function playNext() {
            if (playlist.length === 0) return;
            let nextIndex = currentPlayIndex + 1;
            if (nextIndex >= playlist.length) nextIndex = 0; 
            playSong(nextIndex);
        }

        function toggleLyrics() {
            const isLyrics = document.getElementById('view-lyrics').classList.contains('active');
            if (isLyrics) { switchView('youtube'); } 
            else { switchView('lyrics'); }
        }

        function toggleCustomFullscreen() {
            const panel = document.body; 
            panel.classList.toggle('fullscreen-active');
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            
            if (viewName === 'youtube') {
                document.getElementById('view-youtube').classList.add('active');
            } else {
                const targetView = document.getElementById(`view-${viewName}`);
                if (targetView) targetView.classList.add('active');
            }
            
            document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
            const lyricsBtn = document.getElementById('btn-toggle-lyrics');
            
            if (viewName === 'lyrics') {
                lyricsBtn.classList.add('active');
                lyricsBtn.title = "回Youtube畫面";
                lyricsBtn.innerText = "回影片";
            } else if (viewName === 'youtube') {
                lyricsBtn.classList.add('active');
                lyricsBtn.title = "進歌詞";
                lyricsBtn.innerText = "看歌詞";
            } else {
                lyricsBtn.title = "進歌詞";
                lyricsBtn.innerText = "看歌詞";
                const activeBtn = Array.from(document.querySelectorAll('.toolbar button')).find(btn => btn.innerText.includes(viewName === 'edit' ? '新增與編輯' : '歌曲列表'));
                if(activeBtn) activeBtn.classList.add('active');
            }

            if (viewName === 'songs') renderSongGrid(songs);
        }

        function renderSongGrid(displaySongs = songs) {
            const grid = document.getElementById('song-grid');
            if(!grid) return;
            grid.innerHTML = '';
            
            if (displaySongs.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; color:#ccc;">目前歌曲庫沒有資料喔，趕快去新增吧！</div>';
                return;
            }

            displaySongs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <input type="checkbox" class="song-select-cb" value="${song.id}" title="勾選以批量刪除">
                    <strong>${song.title}</strong>
                    <div class="card-btn-group">
                        <button class="add-to-playlist-btn" onclick="addToPlaylist(${song.id})" title="加入播放列表"></button>
                        <button class="edit-song-btn" onclick="editSong(${song.id})" title="編輯歌曲資料">✏️</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // =========================================
        // 播放列表拖曳相關邏輯
        // =========================================
        let dragPlaylistSrcEl = null;

        function handlePlaylistDragStart(e) {
            dragPlaylistSrcEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
            this.classList.add('dragging');
        }
        function handlePlaylistDragOver(e) { if (e.preventDefault) e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
        function handlePlaylistDragEnter(e) { this.classList.add('drag-over'); }
        function handlePlaylistDragLeave(e) { this.classList.remove('drag-over'); }
        function handlePlaylistDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            if (dragPlaylistSrcEl !== this) {
                const srcIndex = parseInt(dragPlaylistSrcEl.dataset.index);
                const targetIndex = parseInt(this.dataset.index);
                
                const [movedItem] = playlist.splice(srcIndex, 1);
                playlist.splice(targetIndex, 0, movedItem);

                if (currentPlayIndex === srcIndex) {
                    currentPlayIndex = targetIndex;
                } else if (srcIndex < currentPlayIndex && targetIndex >= currentPlayIndex) {
                    currentPlayIndex--;
                } else if (srcIndex > currentPlayIndex && targetIndex <= currentPlayIndex) {
                    currentPlayIndex++;
                }

                localStorage.setItem('kalaok_playlist', JSON.stringify(playlist));
                renderPlaylist(); 
            }
            return false;
        }
        function handlePlaylistDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('#playlist-ul li').forEach(item => item.classList.remove('drag-over'));
        }

        function renderPlaylist() {
            const ul = document.getElementById('playlist-ul');
            ul.innerHTML = '';
            playlist.forEach((song, index) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.index = index;
                if (index === currentPlayIndex) li.classList.add('playing');
                li.innerHTML = `
                    <div class="drag-handle-playlist" title="按住拖曳">☰</div>
                    <span onclick="playSong(${index})" style="flex:1; cursor:pointer;">${index + 1}. ${song.title}</span>
                    <button class="remove-btn" onclick="removeFromPlaylist(${index})" title="移除">✖</button>
                `;
                
                li.addEventListener('dragstart', handlePlaylistDragStart);
                li.addEventListener('dragover', handlePlaylistDragOver);
                li.addEventListener('dragenter', handlePlaylistDragEnter);
                li.addEventListener('dragleave', handlePlaylistDragLeave);
                li.addEventListener('drop', handlePlaylistDrop);
                li.addEventListener('dragend', handlePlaylistDragEnd);

                ul.appendChild(li);
            });
        }

        function updateLyricsView() {
            if (currentPlayIndex >= 0 && currentPlayIndex < playlist.length) {
                const song = playlist[currentPlayIndex];
                document.getElementById('lyrics-title').innerText = song.title;
                document.getElementById('lyrics-content').innerText = song.lyrics || "無歌詞";
            } else {
                document.getElementById('lyrics-title').innerText = "尚未播放歌曲";
                document.getElementById('lyrics-content').innerText = "請先從播放列表選擇歌曲開始播放。";
            }
        }

        function addToPlaylist(songId) {
            const song = songs.find(s => s.id === songId);
            if (song) {
                playlist.push(song);
                localStorage.setItem('kalaok_playlist', JSON.stringify(playlist)); 
                renderPlaylist();
                showToast(`已將「${song.title}」加入播放列表`);
            }
        }

        function removeFromPlaylist(index) {
            playlist.splice(index, 1);
            if (index < currentPlayIndex) currentPlayIndex--;
            else if (index === currentPlayIndex) {
                currentPlayIndex = -1; 
                document.getElementById('youtube-container').innerHTML = '<div id="yt-player-placeholder" style="color:#666; font-size: 18px;">請從下方播放列表選擇歌曲。</div>';
                player = null; 
            }
            localStorage.setItem('kalaok_playlist', JSON.stringify(playlist));
            renderPlaylist();
            updateLyricsView();
        }
    </script>
</body>
