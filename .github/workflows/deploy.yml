name: 自動注入 Token 並部署到 GitHub Pages

# 觸發條件：當程式碼推送到 main 分支時執行 (若您的主分支叫 master 請自行更改)
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 讓機器人取得您的原始碼
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 核心步驟：將你的個人Secret注入 HTML (這裡維持用你的個人 Key)
      - name: Inject Secret into HTML
        run: |
          sed -i 's/__MY_SECRET_TOKEN__/${{ secrets.JOHSOK_KALAOK_KEY }}/g' index.html

      # 3. 部署到 Pages (這裡必須使用內建的 GITHUB_TOKEN)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # 👇⚠️ 請絕對確認這裡寫的是 GITHUB_TOKEN，不要改名
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          publish_dir: ./