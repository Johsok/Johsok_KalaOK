name: 自動注入 Token 並部署到 GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 開啟機器人寫入程式碼的權限 (避免 Error 128)
    permissions:
      contents: write

    steps:
      # 1. 讓機器人取得原始碼
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 核心步驟：將專案保險箱中的 PAT 注入到 index.html
      - name: Inject Secret into HTML
        run: |
          sed -i 's/__MY_SECRET_TOKEN__/${{ secrets.JOHSOK_KALAOK_KEY }}/g' index.html

      # 3. 將替換完成的檔案發布到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # 👇 這裡必須使用系統內建的 GITHUB_TOKEN，不要改成你的金鑰名稱
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./